<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Frame to Form</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .signup-container { background: #1e293b; padding: 40px; border-radius: 8px; border: 1px solid #334155; width: 100%; max-width: 400px; }
    h1 { color: #64b5f6; margin-bottom: 10px; text-align: center; font-size: 28px; }
    .subtext { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
    input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
    input:focus { outline: none; border-color: #64b5f6; }
    .error { color: #ef4444; font-size: 12px; margin-top: 5px; }
    button { width: 100%; padding: 12px; background: #64b5f6; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
    button:hover { background: #3b82f6; }
    .links { text-align: center; margin-top: 20px; font-size: 14px; }
    .links a { color: #64b5f6; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .trial-note { background: rgba(100, 181, 246, 0.1); border: 1px solid #64b5f6; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 13px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="signup-container">
    <h1>Create Account</h1>
    <p class="subtext">Join Frame to Form and start creating 3D assets</p>
    
    <div class="trial-note">
      ✨ Get 14 days free. No credit card required.
    </div>

    <form id="signupForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
        <div class="error" id="emailError"></div>
      </div>
      <div class="form-group">
