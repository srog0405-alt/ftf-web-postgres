<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing - Frame to Form</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; margin-bottom: 60px; }
    .logo { font-size: 24px; font-weight: bold; color: #64b5f6; }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { color: #94a3b8; text-decoration: none; }
    .logout-btn { background: #ef4444; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
    h1 { text-align: center; color: #f1f5f9; margin-bottom: 50px; font-size: 36px; }
    .pricing-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; margin-bottom: 60px; }
    .plan { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 40px; text-align: center; }
    .plan.active { border: 2px solid #64b5f6; }
    .plan-name { font-size: 24px; color: #64b5f6; margin-bottom: 15px; }
    .plan-price { font-size: 48px; font-weight: bold; color: #f1f5f9; margin-bottom: 10px; }
    .plan-price span { font-size: 18px; color: #94a3b8; }
    .plan-description { color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
    .plan-features { text-align: left; margin-bottom: 30px; color: #94a3b8; font-size: 14px; }
    .plan-features li { margin-bottom: 10px; list-style: none; }
    .plan-features li:before { content: "✓ "; color: #4ade80; margin-right: 8px; }
    .btn { padding: 12px 30px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-primary { background: #64b5f6; color: #0f172a; }
    .btn-primary:hover { background: #3b82f6; }
    .account-link { color: #64b5f6; text-decoration: none; margin-top: 20px; display: block; }
    .account-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">📐 Frame to Form</div>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/account">Account</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </header>

    <h1>Choose Your Plan</h1>

    <div class="pricing-container">
      <div class="plan active">
        <div class="plan-name">Trial</div>
        <div class="plan-price">Free<span>/14 days</span></div>
        <div class="plan-description">Get started with Frame to Form</div>
        <ul class="plan-features">
