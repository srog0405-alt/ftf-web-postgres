<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Frame to Form</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-container { background: #1e293b; padding: 40px; border-radius: 8px; border: 1px solid #334155; width: 100%; max-width: 400px; }
    h1 { color: #64b5f6; margin-bottom: 30px; text-align: center; font-size: 28px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
    input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
    input:focus { outline: none; border-color: #64b5f6; }
    .error { color: #ef4444; font-size: 12px; margin-top: 5px; }
    button { width: 100%; padding: 12px; background: #64b5f6; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
    button:hover { background: #3b82f6; }
    .links { text-align: center; margin-top: 20px; font-size: 14px; }
    .links a { color: #64b5f6; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .divider { margin: 0 10px; color: #64748b; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
        <div class="error" id="emailError"></div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required>
        <div class="error" id="passwordError"></div>
      </div>
      <button type="submit">Login</button>
    </form>
    <div class="links">
      <a href="/forgot-password">Forgot Password?</a>
      <span class="divider">•</span>
      <a href="/signup">Sign Up</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.redirect) window.location.href = data.redirect;
        else document.getElementById('emailError').textContent = data.error;
      } catch (err) {
        document.getElementById('emailError').textContent = 'Error logging in';
      }
    });
  </script>
</body>
</html>
