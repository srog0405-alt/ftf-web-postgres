<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Frame to Form</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: #1e293b; padding: 40px; border-radius: 8px; border: 1px solid #334155; width: 100%; max-width: 400px; }
    h1 { color: #64b5f6; margin-bottom: 15px; text-align: center; font-size: 28px; }
    .subtext { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
    input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
    input:focus { outline: none; border-color: #64b5f6; }
    .error { color: #ef4444; font-size: 12px; margin-top: 5px; }
    .success { color: #4ade80; font-size: 12px; margin-top: 5px; }
    button { width: 100%; padding: 12px; background: #64b5f6; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
    button:hover { background: #3b82f6; }
    .links { text-align: center; margin-top: 20px; font-size: 14px; }
    .links a { color: #64b5f6; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Forgot Password?</h1>
    <p class="subtext">Enter your email and we'll send you a reset link</p>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" required>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
      </div>
      <button type="submit">Send Reset Link</button>
    </form>
    <div class="links">
      <a href="/login">Back to Login</a>
    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      
      document.getElementById('error').textContent = '';
      document.getElementById('success').textContent = '';
      
      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('success').textContent = 'Check your email for the reset link!';
          document.getElementById('forgotForm').reset();
        } else {
          document.getElementById('error').textContent = data.error;
        }
      } catch (err) {
        document.getElementById('error').textContent = 'Error sending reset link';
      }
    });
  </script>
</body>
</html>
